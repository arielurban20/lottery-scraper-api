name: Update Latest Fast

on:
  workflow_dispatch:
  schedule:
    - cron: "*/3 * * * *"

permissions:
  contents: write

jobs:
  update-latest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl latest results only
        run: |
          FAST_GAME_SLUGS="powerball,mega-millions,cash4life,millionaire-for-life,the-pick" python -m scrapy crawl latest_from_catalog -O latest_results_raw.json

      - name: Build latest results
        run: |
          python build_latest_from_historical.py

      - name: Commit and push latest files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_results_raw.json latest_results.json
          git diff --cached --quiet || git commit -m "Fast update latest lottery results"
          git push
