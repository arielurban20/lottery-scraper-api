name: Auto Update Lottery Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build catalog
        run: |
          python build_catalog_from_sitemap_v2.py

      - name: Crawl yearly data
        run: |
          python -m scrapy crawl year_from_catalog

      - name: Normalize historical draws
        run: |
          python normalize_historical_draws.py

      - name: Build latest results from historical
        run: |
          python build_latest_from_historical.py

      - name: Build number stats
        run: |
          python build_number_stats.py

      - name: Run strong validation
        run: |
          python validate_generated_data.py

      - name: Create backup
        run: |
          python backup_generated_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto update lottery data"
          git push